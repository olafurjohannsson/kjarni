name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: "1.91.1"

jobs:
  # ─── Lint ───────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets 2>&1 || true

  # ─── Test (CPU only, models cached) ────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
      - uses: Swatinem/rust-cache@v2

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: ~/.cache/kjarni
          key: kjarni-models-v1

      - name: Download test models
        run: |
          cargo run --package kjarni-cli -- model download distilbert-sentiment
          cargo run --package kjarni-cli -- model download roberta-sentiment
          cargo run --package kjarni-cli -- model download bert-sentiment-multilingual
          cargo run --package kjarni-cli -- model download roberta-emotions
          cargo run --package kjarni-cli -- model download toxic-bert
          cargo run --package kjarni-cli -- model download distilroberta-emotion
          cargo run --package kjarni-cli -- model download minilm-l6-v2
          cargo run --package kjarni-cli -- model download gpt2

      - name: Run tests
        run: cargo test --workspace --exclude kjarni-wasm

  # ─── Linux x86_64 ──────────────────────────────────────────────
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64

      - name: Install cargo-zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build CLI
        run: cargo zigbuild --release --package kjarni-cli --target x86_64-unknown-linux-gnu.2.17

      - name: Build FFI
        run: cargo zigbuild --release --package kjarni-ffi --target x86_64-unknown-linux-gnu.2.17

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/kjarni dist/
          cp target/x86_64-unknown-linux-gnu/release/libkjarni_ffi.so dist/
          cp crates/kjarni-ffi/include/kjarni.h dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: kjarni-x86_64-linux
          path: dist/

  # ─── Release ────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package archives
        run: |
          cd artifacts
          tar -czf kjarni-x86_64-linux.tar.gz \
            -C kjarni-x86_64-linux .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/kjarni-x86_64-linux.tar.gz